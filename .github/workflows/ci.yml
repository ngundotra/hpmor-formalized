name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: TimeTravel.Novikov
            target: HpmorFormalized.TimeTravel.Novikov
          - name: TimeTravel.Paradox
            target: HpmorFormalized.TimeTravel.Paradox
          - name: Bayes.Basic
            target: HpmorFormalized.Bayes.Basic
          - name: DecisionTheory.Basic
            target: HpmorFormalized.DecisionTheory.Basic
          - name: GameTheory.Basic
            target: HpmorFormalized.GameTheory.Basic

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Check ${{ matrix.name }}
        run: lake build ${{ matrix.target }}

  build-project:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build project
        run: lake build
